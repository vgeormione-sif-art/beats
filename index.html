<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beats - Blog de Geo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Arial',sans-serif;
  background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);
  color:#fff;
  min-height:100vh;
}
header{
  background:#1DB954;
  padding:30px;
  text-align:center;
  box-shadow:0 4px 20px rgba(29,185,84,0.4);
}
header h1{font-size:42px;margin-bottom:5px}
header p{font-size:16px;color:#000;font-weight:bold}
.container{
  max-width:900px;
  margin:40px auto;
  padding:0 20px;
}
.card{
  background:#222;
  padding:30px;
  border-radius:16px;
  margin-bottom:30px;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}
.card h2{color:#1DB954;margin-bottom:15px;font-size:24px}
.card p{line-height:1.8;color:#ddd;margin-bottom:15px}
.foto{
  width:100%;
  border-radius:12px;
  margin:15px 0;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}
footer{
  text-align:center;
  padding:30px;
  color:#666;
  font-size:14px;
}
</style>
</head>
<body>

<header>
  <h1>beats</h1>
  <p>Blog Examen | Geo | vgeormione-sif-art</p>
</header>

<div class="container">

  <div class="card">
    <h2>Sobre Mi Blog</h2>
    <p>Aquí va tu texto Geo. Cuenta de qué trata tu blog. Puedes poner 2 o 3 párrafos bonitos.</p>
    <img class="foto" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=900" alt="Música">
  </div>

  <div class="card">
    <h2>Mis Beats Favoritos</h2>
    <p>Aquí pones otra parte. Más texto, más cosas de ti.</p>
    <img class="foto" src="https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=900" alt="Beat">
  </div>

</div>

<footer>
  Examen 2026 | vgeormione-sif-art
</footer>

</body>
</html>
